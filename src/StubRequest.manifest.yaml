  purpose: "Stub implementation of RequestInterface for testing with branded HTTP types"
  domain: "testing"
  subdomain: "doubles"
  verb: "create"
  entity: "StubRequest"

layer: L2_MOLECULE

contract:
  input: "?HttpMethod method, ?UriPath uri, ?HeaderMap headers, ?HttpBody body"
  output:
    success: "StubRequest (implements RequestInterface)"
    failure: null
  side_effects: NONE
  idempotent: true
  deterministic: true

dependencies:
  - "aria.HttpMethod"
  - "aria.UriPath"
  - "aria.HeaderMap"
  - "aria.HttpBody"

connections:
  - "aria.http.RequestInterface"

context_budget:
  to_use: 50
  to_modify: 100
  to_extend: 200
  to_replace: 80

test_contract:
  scenarios:
    - "default StubRequest returns branded GET, root path, empty headers, and empty body"
    - "custom StubRequest preserves branded values through round-trip"
    - "StubRequest satisfies the runtime RequestInterface contract"

stability: EXPERIMENTAL

lifecycle:
  phase: DRAFT
